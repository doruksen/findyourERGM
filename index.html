<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERGM Method Selector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1c1a;          /* near-black text */
    --paper:#fcfcfa;        /* soft white */
    --rule:#d9d6cf;         /* hairline */
    --rule-strong:#3a3935;  /* dark rule */
    --accent:#6d2620;       /* muted oxblood, used sparingly */
    --muted:#777067;        /* secondary text */
  }
  *{box-sizing:border-box;}
  html{overflow-x:hidden;}
  body{
    margin:0;min-height:100vh;background:var(--paper);color:var(--ink);
    overflow-x:hidden;
    font-family:"Source Serif 4",Georgia,"Times New Roman",serif;
    font-size:18px;line-height:1.55;-webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .wrap{max-width:680px;margin:0 auto;padding:64px 28px 96px;}

  /* masthead */
  .kicker{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  h1{font-weight:700;font-size:clamp(30px,5vw,42px);line-height:1.1;margin:.3em 0 .35em;letter-spacing:-.01em;}
  h1 em{font-style:italic;font-weight:600;}
  .src{font-size:14px;color:var(--muted);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:14px 0;margin-bottom:4px;font-style:italic;}
  .src b{color:var(--ink);font-style:normal;font-weight:600;}

  /* progress + crumbs */
  .prog{display:flex;gap:5px;margin:30px 0 10px;}
  .pseg{height:2px;flex:1;background:var(--rule);}
  .pseg.done,.pseg.active{background:var(--ink);}
  .crumbs{font-size:13.5px;color:var(--muted);min-height:18px;line-height:1.5;}
  .crumbs span{color:var(--muted);}
  .crumbs b{color:var(--ink);font-weight:600;}

  /* question */
  .stage{animation:fade .3s ease both;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .qnum{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:40px;}
  .qtext{font-weight:600;font-size:clamp(22px,3.6vw,28px);line-height:1.2;margin:.2em 0 .3em;letter-spacing:-.005em;}
  .qhelp{color:var(--muted);font-size:16.5px;margin-bottom:26px;max-width:58ch;}

  /* options — plain ruled list, no cards */
  .opts{display:flex;flex-direction:column;border-top:1px solid var(--rule);}
  .opt{
    text-align:left;cursor:pointer;background:none;border:none;
    border-bottom:1px solid var(--rule);padding:18px 4px 18px 0;
    font-family:inherit;color:var(--ink);width:100%;
    display:flex;align-items:baseline;gap:14px;transition:padding-left .15s ease;
  }
  .opt:hover{padding-left:10px;}
  .opt .mark{color:var(--rule);font-size:15px;flex:0 0 auto;transition:color .15s ease;line-height:1.5;}
  .opt:hover .mark{color:var(--accent);}
  .opt .otext{flex:1;}
  .opt .ot{font-weight:600;font-size:19px;display:block;}
  .opt .od{font-size:15.5px;color:var(--muted);line-height:1.45;margin-top:1px;}

  .back{margin-top:30px;background:none;border:none;font-family:inherit;font-size:15px;font-style:italic;color:var(--muted);cursor:pointer;padding:4px 0;}
  .back:hover{color:var(--accent);}
  .back::before{content:"← ";font-style:normal;}

  /* result */
  .result{animation:fade .35s ease both;}
  .rlabel{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:34px;}
  .rfam{font-size:14.5px;color:var(--muted);font-style:italic;margin-top:8px;}
  .rname{font-weight:700;font-size:clamp(24px,4vw,32px);line-height:1.12;margin:.15em 0 .2em;letter-spacing:-.01em;}
  .rhead{border-bottom:2px solid var(--rule-strong);padding-bottom:18px;margin-bottom:4px;}
  .rrow{padding:18px 0;border-bottom:1px solid var(--rule);}
  .rrow .rk{font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;}
  .rrow .rv{font-size:17px;line-height:1.5;color:var(--ink);}
  .rrow .rv b{font-weight:600;}
  .rrow .rv .mono{font-style:italic;}
  .chip{display:inline-block;font-size:14px;color:var(--ink);margin:0 4px 0 0;}
  .chip:not(:last-child)::after{content:" ·";color:var(--rule);}
  .warn{padding:16px 0 2px;}
  .warn .rk{color:var(--accent);}
  .warn .rv{font-size:15.5px;color:var(--ink);font-style:italic;}
  .actions{display:flex;gap:24px;flex-wrap:wrap;margin-top:26px;}
  .btn{font-family:inherit;font-size:15px;font-style:italic;cursor:pointer;border:none;background:none;color:var(--ink);padding:2px 0;border-bottom:1px solid var(--ink);}
  .btn:hover{color:var(--accent);border-color:var(--accent);}
  .btn.ghost{color:var(--muted);border-color:var(--rule);}
  .btn.ghost:hover{color:var(--accent);border-color:var(--accent);}
  .path{font-size:13.5px;color:var(--muted);margin-top:22px;line-height:1.7;font-style:italic;}
  .path b{color:var(--ink);font-style:normal;font-weight:600;}

  /* code block */
  .codewrap{margin-top:8px;min-width:0;max-width:100%;}
  .codehead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:8px;}
  .codehead .lang{font-size:12.5px;letter-spacing:.06em;color:var(--muted);font-style:italic;}
  .copybtn{font-family:inherit;font-size:13.5px;font-style:italic;cursor:pointer;border:none;background:none;color:var(--ink);border-bottom:1px solid var(--ink);padding:1px 0;}
  .copybtn:hover{color:var(--accent);border-color:var(--accent);}
  .copybtn.copied{color:var(--accent);border-color:transparent;}
  pre.code{
    margin:0;padding:16px 18px;background:#f3f1ec;border:1px solid var(--rule);border-radius:3px;
    overflow-x:auto;max-width:100%;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:13px;line-height:1.55;color:#2a2926;white-space:pre;tab-size:2;
  }

  /* tooltip term */
  .term{border-bottom:1px dotted var(--muted);cursor:help;position:relative;}
  .term:focus{outline:none;}
  .term .tip{
    visibility:hidden;opacity:0;position:absolute;left:0;bottom:calc(100% + 8px);z-index:40;
    width:min(300px,72vw);background:var(--ink);color:#f3f1ec;font-style:normal;font-weight:400;
    font-size:13.5px;line-height:1.45;letter-spacing:0;text-transform:none;
    padding:11px 13px;border-radius:4px;box-shadow:0 6px 22px rgba(0,0,0,.22);
    transition:opacity .14s ease,visibility .14s ease;pointer-events:none;
  }
  .term .tip::after{content:"";position:absolute;top:100%;left:18px;border:6px solid transparent;border-top-color:var(--ink);}
  .term:hover .tip,.term:focus .tip{visibility:visible;opacity:1;}
  @media(hover:none){.term:hover .tip{visibility:hidden;opacity:0;}.term:focus .tip{visibility:visible;opacity:1;}}
  .credit{margin-top:72px;padding-top:18px;border-top:1px solid var(--rule);text-align:center;font-size:12.5px;letter-spacing:.04em;color:var(--muted);font-style:italic;}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Method Selector</div>
  <h1>Choosing an <em>ERGM</em> specification</h1>
  <div class="src">A guided sequence of questions, routing to a single recommendation. After <b>Lusher, Koskinen &amp; Robins (2013)</b>, Cambridge University Press.</div>

  <div class="prog" id="prog"></div>
  <div class="crumbs" id="crumbs"></div>

  <div id="app"></div>

  <div class="credit">Developed by Doruk Sen</div>
</div>

<script>
/* ---------------- Glossary (hover/tap definitions) ---------------- */
const GLOSSARY = {
  "dyadic independence":"Assumes the presence of a tie depends only on the reverse tie in the same pair, not on ties elsewhere. The model then reduces to a logistic regression on dyads.",
  "reciprocity":"The tendency for a directed tie i→j to be matched by j→i. Captured by the 'mutual' term; only meaningful in directed networks.",
  "homophily":"The tendency to form ties with similar others. On a categorical attribute it is fitted with nodematch(); on a continuous one with absdiff() or nodecov().",
  "dyadic covariate":"An external pair-level variable (e.g. geographic distance, or another network) used to predict ties, entered with edgecov() or dyadcov().",
  "social-circuit":"A dependence assumption in which two possible ties are conditionally dependent when their four endpoints are linked into a 4-cycle. It underpins the alternating / geometrically-weighted statistics and is far less degeneracy-prone than Markov terms.",
  "geometrically-weighted":"A family of statistics (GWESP, GWDegree, GWDSP) that add successive shared-partners/stars with geometrically declining weight, controlled by a decay parameter. They tame the degeneracy that raw counts cause.",
  "GWESP":"Geometrically-Weighted Edgewise Shared Partners: the modern, stable way to model triadic closure (transitivity) without the degeneracy of a raw triangle count.",
  "GWDegree":"Geometrically-Weighted Degree: captures the spread of the degree distribution — whether ties concentrate on a few popular nodes — as a stable alternative to k-star counts.",
  "alternating-2-paths":"Two-paths (i→k→j) weighted geometrically; the GWDSP term. They represent shared partners that are NOT yet closed into a triangle — the 'reach' or open-brokerage structure.",
  "degeneracy":"A pathology where the model places almost all probability on near-empty or near-complete graphs, so it neither resembles the data nor estimates stably. Usually a symptom of mis-specification, not of the algorithm.",
  "MCMC-MLE":"Markov-chain Monte Carlo maximum likelihood: the likelihood is intractable, so it is approximated by simulating many graphs from trial parameters and matching their statistics to the observed network.",
  "Bayesian":"Estimation that combines a prior with the likelihood to yield a posterior distribution over parameters; useful for small or unstable networks and for principled uncertainty (e.g. the Bergm package).",
  "goodness-of-fit":"A check that simulates many networks from the fitted model and compares features you did NOT fit directly (degree, shared-partner and geodesic distributions, triad census) against the observed network.",
  "triad census":"The frequency of each possible configuration among triples of nodes; a standard goodness-of-fit yardstick for whether a model reproduces local structure.",
  "geodesic":"The shortest path length between two nodes. The distribution of geodesics is a common goodness-of-fit check for global reach.",
  "edge-triangle":"A higher-order (partial-inclusion) dependence that couples closure with degree, letting you distinguish actors who are embedded (closed) from those who also bridge outward.",
  "entrainment":"In multivariate models, the tendency for a tie in one relation to coincide with a tie in another (e.g. friends are also collaborators).",
  "exchange":"In multivariate models, the tendency for a tie in one relation to be reciprocated by a tie in a DIFFERENT relation.",
  "bipartite":"A two-mode network with two distinct node sets (e.g. people and events); ties run only between the modes, so ordinary triangles cannot form.",
  "4-cycles":"In two-mode data, the smallest closed structure: two actors both attached to the same two events. They play the clustering role that triangles play in one-mode networks.",
  "continuous-time Markov":"A model of network change in which ties flip on/off over continuous time, with the next change depending only on the current network state; the basis of tie-oriented longitudinal ERGMs.",
  "SAOM":"Stochastic Actor-Oriented Model (the SIENA/RSiena framework): an actor-driven alternative to longitudinal ERGMs, where actors evaluate and adjust their own ties over time.",
  "contagion":"In an ALAAM, the tendency for connected actors to share the same outcome — the network-attribute effect that operationalises social influence.",
  "ALAAM":"Autologistic Actor Attribute Model: the outcome is a binary ACTOR attribute (a behaviour), modelled as a function of network position and neighbours' attributes, on a fixed network."
};

// Wrap any glossary term appearing in a string with a hover/tap tooltip.
// Longest keys first so multi-word terms win over their fragments.
const GLOSSARY_KEYS = Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
function annotate(text){
  let used = new Set();
  GLOSSARY_KEYS.forEach(key=>{
    if(used.has(key)) return;
    // case-insensitive, whole-word-ish, first occurrence only, skip if already inside a tag
    const re = new RegExp('(?<![\\w>])('+key.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\$&')+')(?![\\w<])','i');
    if(re.test(text) && !used.has(key)){
      text = text.replace(re, (m,p1)=>{
        used.add(key);
        const def = GLOSSARY[key].replace(/"/g,'&quot;');
        return `<span class="term" tabindex="0">${p1}<span class="tip">${def}</span></span>`;
      });
    }
  });
  return text;
}

/* ---------------- Decision graph ---------------- */
const NODES = {
  start: {
    q: "What is the primary thing you want to explain?",
    help: "This is the single biggest fork: are you modelling the ties themselves, or an actor attribute that spreads across a fixed network?",
    opts: [
      {t:"The network ties", d:"Why ties form / exist between actors — structure is the outcome.", go:"modes"},
      {t:"An actor attribute", d:"The network is fixed; you want to explain a behaviour/attribute that may diffuse across it (social influence / contagion.", go:"alaam"}
    ]
  },
  modes: {
    q: "How many node types and relations are involved?",
    help: "The structural form of the data fixes the model family before any effects are chosen.",
    opts: [
      {t:"One relation, one set of actors", d:"A single network among one kind of node.", go:"timing"},
      {t:"Two or more relations, same actors", d:"e.g. advice AND friendship on the same people.", go:"multi"},
      {t:"Two distinct node types", d:"Actors tied to events / groups / boards (two-mode).", go:"bip_time"}
    ]
  },
  timing: {
    q: "How many time points do you observe?",
    help: "Two or more waves let you model the process of change rather than a single snapshot.",
    opts: [
      {t:"One snapshot", d:"A single cross-sectional observation.", go:"directed"},
      {t:"Two or more waves", d:"The same network observed repeatedly (panel).", go:"longi"}
    ]
  },
  directed: {
    q: "Are the ties directed?",
    help: "Direction opens reciprocity and directed-closure effects and changes which statistics you use.",
    opts: [
      {t:"Directed", d:"Sender → receiver (e.g. 'asks advice of').", go:"endog", set:{dir:"directed"}},
      {t:"Undirected", d:"Symmetric (e.g. 'collaborates with').", go:"endog", set:{dir:"undirected"}}
    ]
  },
  endog: {
    q: "What drives tie formation in your hypotheses?",
    help: "This selects your dependence assumption — the rung on Pattison et al.'s hierarchy.",
    opts: [
      {t:"Attributes & covariates only", d:"Homophily, sender/receiver effects, dyadic covariates — no endogenous structure.", go:"R_selection"},
      {t:"Endogenous structure", d:"Self-organising patterns: clustering, popularity, closure, brokerage.", go:"struct"}
    ]
  },
  struct: {
    q: "Which structural process is central?",
    help: "Climb only as high as the theory needs. Social-circuit is the robust modern default.",
    opts: [
      {t:"General clustering / popularity / closure", d:"The typical case.", go:"R_socialcircuit"},
      {t:"Brokerage combined with degree", d:"'Closure + reach' — who bridges while staying embedded.", go:"R_edgetri"},
      {t:"Long-range / fuzzy network boundary", d:"Dependence along longer paths, or unclear who is 'in'.", go:"R_higher"}
    ]
  },
  multi:    { result:"R_multi" },
  bip_time: {
    q: "One snapshot or several waves of the two-mode network?",
    help:"",
    opts:[
      {t:"One snapshot", d:"Cross-sectional affiliation data.", go:"R_bipartite"},
      {t:"Several waves", d:"Affiliation observed over time.", go:"R_longi_bip"}
    ]
  },
  alaam:    { result:"R_alaam" },
  longi:    { result:"R_longi" },
};

/* ---------------- Results ---------------- */
const RESULTS = {
  R_selection: {
    fam:"One-mode ERGM · dyadic-independence", name:"Social-Selection ERGM",
    rung:"Dyadic independence (I₀ / PI₀)",
    spec:"Edge (density) + reciprocity (if directed) + actor attribute effects (sender, receiver, homophily/matching) + dyadic covariates. No endogenous star/triangle terms.",
    est:"This reduces to logistic regression on dyads — but fit it within the ERGM framework so you can later add structure. MCMC-MLE.",
    gof:"Simulate from the fitted model; check degree distribution, geodesics and triad census against the observed network.",
    tools:["statnet / ergm (R)","PNet / MPNet"],
    ch:["Ch 6.6","Ch 8"],
    warn:"If GOF shows the model can't reproduce clustering or the degree spread, your data has endogenous structure — go back and add social-circuit terms.",
    code:`library(ergm)

# net: a 'network' object; 'group' & 'score' are vertex attributes
m <- ergm(net ~ edges +              # density baseline
                mutual +             # reciprocity (drop if undirected)
                nodematch("group") + # homophily on a categorical attribute
                nodecov("score"),    # main effect of a continuous attribute
          control = control.ergm(seed = 1))

summary(m)                 # coefficients, SEs, p-values
mcmc.diagnostics(m)        # only meaningful once structural terms are added
gof.m <- gof(m)            # dyad-independent models fit by MLE directly
plot(gof.m)                # compare simulated vs observed features`
  },
  R_socialcircuit: {
    fam:"One-mode ERGM · social-circuit", name:"Structural ERGM with Alternating Statistics",
    rung:"Social-circuit (SI₁ / I₁) — the recommended default",
    spec:"Edge + (reciprocity if directed) + ALTERNATING / geometrically-weighted statistics: alternating-k-stars (GWDegree) for popularity, alternating-triangles (GWESP) for closure, alternating-2-paths. Add attribute & covariate effects as needed.",
    est:"MCMC maximum likelihood (Geyer–Thompson importance sampling or Robbins–Monro stochastic approximation). Use Bayesian estimation instead if N is small or estimation is unstable.",
    gof:"Simulate many graphs; compare non-modelled features (full degree distribution, shared-partner distribution, geodesic distribution, triad census).",
    tools:["statnet / ergm (R)","PNet / MPNet","Bergm (if Bayesian)"],
    ch:["Ch 6.6.4","Ch 12","Ch 13"],
    warn:"Do NOT use raw Markov stars & triangles — they are degeneracy-prone. If MCMC won't converge, suspect the specification, not the algorithm; alternating forms are the fix.",
    code:`library(ergm)

# Social-circuit specification with geometrically-weighted terms.
# fixed decay = TRUE keeps the curved parameter fixed (a stable default).
m <- ergm(net ~ edges +
                mutual +                         # reciprocity (drop if undirected)
                gwesp(0.5, fixed = TRUE) +       # closure (alternating triangles)
                gwdegree(0.5, fixed = TRUE) +    # popularity spread (alt. k-stars)
                gwdsp(0.5, fixed = TRUE) +       # alternating 2-paths
                nodematch("group") + nodecov("score"),
          control = control.ergm(MCMC.samplesize = 5000,
                                 MCMC.burnin = 20000, seed = 1))

summary(m)
mcmc.diagnostics(m)        # check chains mixed & converged
plot(gof(m))               # degree, edgewise-shared-partner, geodesic, etc.

# If estimation degenerates: lower/raise the decay, or drop the heaviest term.`
  },
  R_edgetri: {
    fam:"One-mode ERGM · edge-triangle", name:"Edge-Triangle (PI₁) Model",
    rung:"Partial inclusion (PI₁)",
    spec:"Edge-triangle statistics that couple closure with degree, letting you separate actors who are both embedded (closed) and reaching outward (brokerage). Combine with the usual edge + alternating terms.",
    est:"MCMC-MLE. Run a long post-estimation simulation to confirm stability — higher-order specifications need extra care.",
    gof:"Standard simulation-based GOF, paying attention to the closure/degree features the model targets.",
    tools:["PNet / MPNet","statnet / ergm (R)"],
    ch:["Ch 22.2","Ch 6.6"],
    warn:"This is a specialised rung — only adopt it if brokerage-with-degree is genuinely central to your theory (Occam's razor).",
    code:`library(ergm)

# Edge-triangle (PI1): couple closure with degree so you can tell apart
# embedded actors from those who also reach outward (brokerage).
m <- ergm(net ~ edges +
                mutual +
                gwesp(0.5, fixed = TRUE) +    # closure
                gwdegree(0.5, fixed = TRUE) + # degree dispersion
                gwdsp(0.5, fixed = TRUE) +    # open 2-paths = reach
                nodematch("group"),
          control = control.ergm(MCMC.samplesize = 8000,
                                 MCMC.burnin = 30000, seed = 1))

summary(m)
mcmc.diagnostics(m)
# Run a long post-fit simulation to confirm stability before trusting it:
sim <- simulate(m, nsim = 200); plot(gof(m))`
  },
  R_higher: {
    fam:"One-mode ERGM · higher realisation-dependent", name:"Long-Range / Component-Dependent Model",
    rung:"Three-path (D₁) up to component independence (Dₙ₋₁)",
    spec:"Three-path or longer-path dependence; or component independence when the network boundary is uncertain (confines attention to connected components).",
    est:"MCMC-MLE; consider Bayesian. If you reached this via a snowball/link-traced sample, use conditional zone-based estimation (you needn't know total N).",
    gof:"Simulation-based GOF; be especially alert to degeneracy at these general specifications.",
    tools:["PNet / MPNet","statnet / ergm (R)"],
    ch:["Ch 22.2","Ch 12.8"],
    warn:"The most general rungs are the most degeneracy-prone. Justify each added term theoretically and validate fit carefully.",
    code:`library(ergm)

# Higher-order / long-range dependence. Add path-based terms cautiously,
# one at a time, watching for degeneracy after each addition.
m <- ergm(net ~ edges +
                gwesp(0.5, fixed = TRUE) +
                gwdsp(0.5, fixed = TRUE) +     # 2-paths
                threepath,                     # longer-range dependence
          control = control.ergm(MCMC.samplesize = 10000,
                                 MCMC.burnin = 50000, seed = 1))

summary(m); mcmc.diagnostics(m); plot(gof(m))

# Snowball / link-traced sample? Hold observed ties fixed and estimate
# conditionally instead (see the conditional-estimation literature, Ch 12.8).`
  },
  R_multi: {
    fam:"Multivariate ERGM", name:"Multivariate (Multi-Relational) ERGM",
    rung:"Cross-network dependence",
    spec:"Model the relations jointly with cross-relation effects: entrainment (ties co-occur), exchange (reciprocity across relations), and cross-relation closure. Alternatively enter one network as a dyadic covariate for the other if you only want directional influence.",
    est:"MCMC-MLE for the joint model.",
    gof:"Simulate the multivariate system; check fit within and across relations.",
    tools:["PNet / MPNet (XPNet)","statnet / ergm (R)"],
    ch:["Ch 10","Ch 16","Ch 21"],
    warn:"Decide deliberately between a joint multivariate model and the simpler 'one network as covariate' approach — they answer different questions.",
    code:`library(ergm)

# Simpler route: enter one network as a dyadic covariate for the other.
# 'advice' and 'friendship' are both 'network' objects on the same actors.
m <- ergm(advice ~ edges +
                   mutual +
                   gwesp(0.5, fixed = TRUE) +
                   edgecov(friendship),   # does friendship predict advice ties?
          control = control.ergm(seed = 1))
summary(m); plot(gof(m))

# Fully joint multivariate ERGMs (entrainment, exchange, cross-closure)
# are handled in MPNet/XPNet — see Ch 10 & 21.`
  },
  R_bipartite: {
    fam:"Bipartite ERGM", name:"Bipartite (Two-Mode) ERGM",
    rung:"Bipartite dependence hierarchy",
    spec:"Mode-specific statistics: edges, mode-specific alternating stars (degree distributions of actors vs. events), and alternating cycles (4-cycles) for co-affiliation clustering. Ordinary triangles cannot form in two-mode data.",
    est:"MCMC-MLE with bipartite specifications.",
    gof:"Simulation-based GOF on both mode degree distributions and cycle statistics.",
    tools:["PNet / MPNet (BPNet)","statnet / ergm (R)"],
    ch:["Ch 10","Ch 20"],
    warn:"Use the bipartite hierarchy and bipartite statistics — do not port one-mode triangle terms across.",
    code:`library(ergm)

# net: a bipartite 'network' object (bipartite = number of mode-1 nodes).
# b1/b2 = the two modes (e.g. actors / events). No ordinary triangles exist.
m <- ergm(net ~ edges +
                gwb1degree(0.5, fixed = TRUE) +  # mode-1 degree spread
                gwb2degree(0.5, fixed = TRUE) +  # mode-2 degree spread
                cycle(4),                        # 4-cycles = co-affiliation
          control = control.ergm(MCMC.samplesize = 6000,
                                 MCMC.burnin = 25000, seed = 1))

summary(m); mcmc.diagnostics(m)
plot(gof(m, GOF = ~ b1degree + b2degree + espartners))`
  },
  R_longi: {
    fam:"Longitudinal ERGM", name:"Longitudinal (Tie-Oriented) ERGM",
    rung:"Continuous-time Markov process",
    spec:"Model the change between waves as a continuous-time Markov chain on ties; specify the same structural + attribute effects but interpret them as drivers of tie change. The actor-oriented SAOM (SIENA) is a valid alternative.",
    est:"Estimation conditions on the observed change between consecutive waves (modified Robbins–Monro).",
    gof:"Assess reproduction of network features across waves.",
    tools:["statnet (tergm)","PNet / MPNet (longitudinal)","RSiena (SAOM alternative)"],
    ch:["Ch 11","Ch 19","Ch 12.4.3"],
    warn:"You need at least two genuine waves. Choose tie-oriented (ERGM) vs actor-oriented (SAOM) based on whether change is driven by ties or by actors making choices.",
    code:`library(tergm)

# nets: a list of 'network' objects, one per wave (same actors).
nets <- list(wave1, wave2, wave3)

# Separable temporal ERGM: model tie formation and dissolution separately.
m <- tergm(nets ~
             Form(~ edges + mutual + gwesp(0.5, fixed = TRUE)) +
             Diss(~ edges),
           estimate = "CMLE",          # conditional MLE across waves
           control = control.tergm(seed = 1))

summary(m)

# Actor-oriented alternative (RSiena) if change is driven by actors' choices:
# library(RSiena); siena07(...)`
  },
  R_longi_bip: {
    fam:"Longitudinal bipartite", name:"Longitudinal Bipartite ERGM",
    rung:"Continuous-time process on two-mode ties",
    spec:"Combine the bipartite specification (mode-specific stars, 4-cycles) with a tie-oriented dynamic model of change between waves.",
    est:"Change-conditioned estimation as in the longitudinal model.",
    gof:"Reproduction of two-mode features across waves.",
    tools:["PNet / MPNet (longitudinal)","statnet (tergm)"],
    ch:["Ch 10","Ch 11","Ch 20"],
    warn:"This combines two of the harder branches — keep the specification lean and validate fit carefully.",
    code:`library(tergm)

# nets: list of BIPARTITE 'network' objects, one per wave.
nets <- list(wave1, wave2)   # each created with bipartite = n_mode1

m <- tergm(nets ~
             Form(~ edges + gwb1degree(0.5, fixed = TRUE) +
                            gwb2degree(0.5, fixed = TRUE) + cycle(4)) +
             Diss(~ edges),
           estimate = "CMLE",
           control = control.tergm(seed = 1))

summary(m)
# Keep terms few; bipartite + longitudinal models degenerate easily.`
  },
  R_alaam: {
    fam:"Influence model", name:"Autologistic Actor Attribute Model (ALAAM)",
    rung:"Network → attribute dependence",
    spec:"The outcome is the actor attribute, not the tie. Specify: independence (baseline prevalence), network-position effects (does being central/active raise the outcome?), network-attribute effects (contagion — do connected actors share the outcome?), and covariate effects.",
    est:"MCMC maximum likelihood, analogous to ERGM estimation.",
    gof:"Simulate the attribute vector given the fixed network; compare to observed.",
    tools:["PNet / MPNet (ALAAM module)","IPNet"],
    ch:["Ch 9","Ch 18"],
    warn:"The network is treated as fixed/exogenous here. If ties and behaviour co-evolve, you instead want a longitudinal co-evolution model (SAOM).",
    code:`# ALAAM is not in the base 'ergm' package. The standard tool is MPNet
# (ALAAM module); an R implementation lives in the 'multilevel.ergm' /
# Bayesian ALAAM scripts circulated by the MelNet group.

# Workflow (MPNet ALAAM):
#  1. Outcome: the binary actor attribute y (what you want to explain).
#  2. Fixed inputs: the network + any covariate attributes.
#  3. Effects to include:
#       - Density            (baseline prevalence of y)
#       - Activity / Contagion (y of an actor vs. degree / neighbours' y)
#       - Covariate effects  (attributes predicting y)
#  4. Estimate, then check convergence (t-ratios < 0.1) and GOF.

# See MPNet manual, ALAAM section, and Ch 9 & 18 for effect definitions.`
  }
};

/* ---------------- Engine ---------------- */
const app = document.getElementById('app');
const progEl = document.getElementById('prog');
const crumbEl = document.getElementById('crumbs');
let history = [];      // stack of node keys
let trail = [];        // chosen option labels
let answers = {};

function setProgress(){
  const total = 4;
  progEl.innerHTML="";
  const depth = Math.min(history.length, total);
  for(let i=0;i<total;i++){
    const s=document.createElement('div');
    s.className="pseg"+(i<depth-1?" done":(i===depth-1?" active":""));
    progEl.appendChild(s);
  }
  crumbEl.innerHTML = trail.length
    ? trail.map(t=>`<b>${t}</b>`).join(' <span>&rsaquo;</span> ')
    : "Each answer narrows the choice toward one method.";
}

function render(key){
  // A key may point straight at a result (lives in RESULTS, not NODES)
  if(RESULTS[key]){ return renderResult(key); }
  const node = NODES[key];
  if(node && node.result){ return renderResult(node.result); }

  setProgress();
  let html = `<div class="stage"><div class="qnum">Question ${history.length}</div>`;
  html += `<div class="qtext">${node.q}</div>`;
  if(node.help) html += `<div class="qhelp">${node.help}</div>`;
  html += `<div class="opts">`;
  node.opts.forEach((o,i)=>{
    html += `<button class="opt" data-i="${i}">
      <span class="mark">&rarr;</span>
      <span class="otext"><span class="ot">${o.t}</span>
      <span class="od">${o.d}</span></span></button>`;
  });
  html += `</div>`;
  if(history.length>1) html += `<button class="back" id="back">Back</button>`;
  html += `</div>`;
  app.innerHTML = html;

  app.querySelectorAll('.opt').forEach(btn=>{
    btn.onclick = ()=>{
      const o = node.opts[+btn.dataset.i];
      if(o.set) Object.assign(answers,o.set);
      trail.push(o.t);
      history.push(o.go);
      render(o.go);
      window.scrollTo({top:0,behavior:'smooth'});
    };
  });
  const back = document.getElementById('back');
  if(back) back.onclick = goBack;
}

function goBack(){
  history.pop(); trail.pop();
  render(history[history.length-1]);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderResult(rkey){
  const r = RESULTS[rkey];
  // mark all progress done
  progEl.innerHTML="";
  for(let i=0;i<4;i++){const s=document.createElement('div');s.className="pseg done";progEl.appendChild(s);}
  crumbEl.innerHTML = trail.map(t=>`<b>${t}</b>`).join(' <span>&rsaquo;</span> ');

  let dirNote = answers.dir ? ` <span class="chip">${answers.dir} ties</span>` : "";

  const codeBlock = r.code ? `
    <div class="rrow">
      <span class="rk">Starter code</span>
      <div class="rv codewrap">
        <div class="codehead">
          <span class="lang">R · statnet / ergm — a scaffold to adapt, not run as-is</span>
          <button class="copybtn" id="copybtn">Copy</button>
        </div>
        <pre class="code" id="codeblock">${escapeHtml(r.code)}</pre>
      </div>
    </div>` : "";

  app.innerHTML = `
  <div class="result">
    <div class="rlabel">Recommended method</div>
    <div class="rhead">
      <div class="rname">${r.name}</div>
      <div class="rfam">${r.fam}</div>
    </div>
    <div class="rrow"><span class="rk">Dependence assumption</span><div class="rv"><span class="mono">${annotate(r.rung)}</span></div></div>
    <div class="rrow"><span class="rk">Specify</span><div class="rv">${annotate(r.spec)}${dirNote}</div></div>
    <div class="rrow"><span class="rk">Estimate</span><div class="rv">${annotate(r.est)}</div></div>
    <div class="rrow"><span class="rk">Check fit</span><div class="rv">${annotate(r.gof)}</div></div>
    ${codeBlock}
    <div class="rrow"><span class="rk">Software</span><div class="rv">${r.tools.map(t=>`<span class="chip">${t}</span>`).join('')}</div></div>
    <div class="warn"><span class="rk">A caution</span><div class="rv">${annotate(r.warn)}</div></div>
    <div class="path">In the book: ${r.ch.map(c=>`<b>${c}</b>`).join(', ')} of Lusher, Koskinen &amp; Robins (2013). Dotted terms have definitions on hover or tap.</div>
    <div class="actions">
      <button class="btn ghost" id="back2">Change last answer</button>
      <button class="btn" id="restart">Start over</button>
    </div>
  </div>`;

  document.getElementById('restart').onclick = ()=>{ history=['start']; trail=[]; answers={}; render('start'); window.scrollTo({top:0,behavior:'smooth'}); };
  document.getElementById('back2').onclick = goBack;
  positionTips(app);

  const cb = document.getElementById('copybtn');
  if(cb){
    cb.onclick = ()=>{
      navigator.clipboard.writeText(r.code).then(()=>{
        cb.textContent = "Copied ✓"; cb.classList.add('copied');
        setTimeout(()=>{ cb.textContent="Copy"; cb.classList.remove('copied'); }, 1800);
      }).catch(()=>{ cb.textContent="Press ⌘/Ctrl-C"; });
    };
  }
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Nudge any tooltip back into view if it would overflow the right/left edge.
function positionTips(scope){
  (scope||document).querySelectorAll('.term').forEach(term=>{
    const reposition = ()=>{
      const tip = term.querySelector('.tip'); if(!tip) return;
      tip.style.left='0'; tip.style.right='auto'; tip.style.transform='none';
      const r = tip.getBoundingClientRect(); const m=10;
      if(r.right > window.innerWidth-m){
        tip.style.transform = `translateX(${Math.floor(window.innerWidth-m-r.right)}px)`;
      } else if(r.left < m){
        tip.style.transform = `translateX(${Math.ceil(m-r.left)}px)`;
      }
    };
    term.addEventListener('mouseenter',reposition);
    term.addEventListener('focus',reposition);
    term.addEventListener('touchstart',reposition,{passive:true});
  });
}

/* boot */
history=['start'];
render('start');
</script>
</body>
</html>
